<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নামজারি সিরিয়াল ম্যানেজার</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- ১. লগইন স্ক্রিন -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200 w-full max-w-sm space-y-4">
            <h2 class="text-center font-bold text-green-700 text-xl">অফিস লগইন প্যানেল</h2>
            <p class="text-center text-xs text-gray-500">আপনার ইউজার আইডি ও পাসওয়ার্ড দিয়ে প্রবেশ করুন</p>
            <hr class="border-gray-200">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ইউজার আইডি (User ID)</label>
                <input type="text" id="usernameInput" placeholder="ID লিখুন" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">পাসওয়ার্ড (Password)</label>
                <input type="password" id="passwordInput" placeholder="Password লিখুন" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600">
            </div>
            <button onclick="handleLogin()" class="w-full bg-green-700 text-white font-bold py-2.5 rounded-lg hover:bg-green-800 transition">লগইন করুন</button>
        </div>
    </div>

    <!-- ২. মেইন ড্যাশবোর্ড -->
    <div id="mainDashboard" class="hidden">
        <!-- হেডার এবং লগআউট বাটন -->
        <header class="bg-green-700 text-white py-4 shadow-md px-4 flex justify-between items-center">
            <h1 class="text-base font-bold sm:text-lg">নামজারি অনুমোদন সিরিয়াল ম্যানেজার</h1>
            <div class="flex items-center space-x-2">
                <span id="userRoleBadge" class="text-xs bg-white text-green-700 font-bold px-2 py-1 rounded"></span>
                <button onclick="handleLogout()" class="text-xs bg-red-600 hover:bg-red-700 px-2.5 py-1 rounded font-bold transition">লগআউট</button>
            </div>
        </header>

        <!-- মেইন কনটেইনার -->
        <main class="max-w-md mx-auto p-4 space-y-4">
            
            <!-- অপশন সিলেক্টর বাটন (ট্যাব সিস্টেম) -->
            <div class="grid grid-cols-2 gap-2 bg-white p-1.5 rounded-xl shadow-sm border border-gray-200">
                <button id="tabAdd" onclick="switchTab('add')" class="py-2.5 text-sm font-bold rounded-lg text-white bg-green-700 transition">
                    আবেদন যুক্ত করুন
                </button>
                <button id="tabDelete" onclick="switchTab('delete')" class="py-2.5 text-sm font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition">
                    আবেদন ডিলিট করুন
                </button>
            </div>

            <!-- সেকশন ১: নতুন আবেদন যুক্ত করার ফরম -->
            <div id="addSection" class="bg-white p-5 rounded-xl shadow-md border border-gray-200 space-y-3">
                <h2 class="text-center font-bold text-green-700 text-sm">নতুন আবেদন নম্বর যুক্ত করুন</h2>
                <input type="number" id="appNumberInput" placeholder="আবেদন নম্বর (Application ID) লিখুন" 
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-600 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                <button onclick="addApplication()" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg hover:bg-green-800 transition active:scale-[0.98]">
                    সিরিয়ালে যুক্ত করুন
                </button>
            </div>

            <!-- সেকশন ২: সার্চ করে ডিলিট করার ফরম -->
            <div id="deleteSection" class="bg-white p-5 rounded-xl shadow-md border border-gray-200 space-y-3 hidden">
                <h2 class="text-center font-bold text-red-600 text-sm">আবেদন নম্বর সার্চ ও ডিলিট প্যানেল</h2>
                <div class="relative">
                    <input type="number" id="searchNumberInput" oninput="searchApplication()" placeholder="ডিলিট করার জন্য আবেদন নম্বরটি লিখুন" 
                        class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                </div>
                <!-- সার্চ রেজাল্ট দেখানোর জায়গা -->
                <div id="searchResultArea" class="pt-2 space-y-2">
                    <div class="text-center text-xs text-gray-400 py-2">নম্বর লিখলে রেজাল্ট এখানে দেখাবে</div>
                </div>
            </div>

            <!-- নিচের লাইভ তালিকা সেকশন -->
            <div id="liveListSection">
                <div class="flex items-center space-x-2 text-gray-700 font-bold mb-2 px-1 text-sm">
                    <svg class="w-4 h-4 text-green-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <span>অনুমোদনের অপেক্ষমাণ তালিকা (ক্রমানুসারে)</span>
                </div>
                <hr class="border-gray-300 mb-3">
                <div id="applicationList" class="space-y-2">
                    <div class="text-center text-gray-500 py-6 text-sm">লোড হচ্ছে...</div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // --- ফায়ারবেস কনফিগারেশন ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const collectionRef = db.collection('namjari_applications');

        let currentUserRole = ""; 
        let allApplications = []; 

        // --- লগইন লজিক ---
        function handleLogin() {
            const uid = document.getElementById('usernameInput').value.trim();
            const pass = document.getElementById('passwordInput').value.trim();

            if (uid === "admin" && pass === "admin123") {
                currentUserRole = "admin";
            } else if (uid === "dataentry" && pass === "data123") {
                currentUserRole = "dataentry";
            } else {
                alert("ভুল আইডি অথবা পাসওয়ার্ড! আবার চেষ্টা করুন।");
                return;
            }

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('userRoleBadge').innerText = currentUserRole === "admin" ? "এডমিন" : "ডাটা এন্ট্রি";
            
            document.getElementById('usernameInput').value = "";
            document.getElementById('passwordInput').value = "";

            switchTab('add');
            loadLiveDatabase();
        }

        // --- লগআউট লজিক ---
        function handleLogout() {
            currentUserRole = "";
            document.getElementById('mainDashboard').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        // --- ট্যাব পরিবর্তনের লজিক ---
        function switchTab(tabName) {
            const tabAdd = document.getElementById('tabAdd');
            const tabDelete = document.getElementById('tabDelete');
            const addSection = document.getElementById('addSection');
            const deleteSection = document.getElementById('deleteSection');
            const liveListSection = document.getElementById('liveListSection');

            if (tabName === 'add') {
                tabAdd.className = "py-2.5 text-sm font-bold rounded-lg text-white bg-green-700 transition";
                tabDelete.className = "py-2.5 text-sm font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition";
                addSection.classList.remove('hidden');
                liveListSection.classList.remove('hidden');
                deleteSection.classList.add('hidden');
            } else {
                tabDelete.className = "py-2.5 text-sm font-bold rounded-lg text-white bg-red-600 transition";
                tabAdd.className = "py-2.5 text-sm font-bold rounded-lg text-gray-600 hover:bg-gray-100 transition";
                deleteSection.classList.remove('hidden');
                addSection.classList.add('hidden');
                liveListSection.classList.add('hidden');
                
                document.getElementById('searchNumberInput').value = "";
                document.getElementById('searchResultArea').innerHTML = `<div class="text-center text-xs text-gray-400 py-2">নম্বর লিখলে রেজাল্ট এখানে দেখাবে</div>`;
            }
        }

        // ১. নতুন আবেদন নম্বর যুক্ত করার ফাংশন (স্বয়ংক্রিয় সার্ভার টাইমস্ট্যাম্প সহ)
        function addApplication() {
            const inputField = document.getElementById('appNumberInput');
            const appNumStr = inputField.value.trim();

            if (appNumStr === "") {
                alert("অনুগ্রহ করে আবেদন নম্বর দিন।");
                return;
            }

            const appNumInt = parseInt(appNumStr, 10);

            collectionRef.add({
                appNumber: appNumInt,
                entryTime: firebase.firestore.FieldValue.serverTimestamp() // অটো তারিখ ও সময় যোগ করার লজিক
            })
            .then(() => {
                inputField.value = ""; 
                inputField.value = null;
                inputField.blur(); 
            })
            .catch((error) => {
                alert("ত্রুটি ঘটেছে: " + error);
            });
        }

        // ২. আবেদন নম্বর ডাটাবেজ থেকে সম্পূর্ণ ডিলিট করার ফাংশন
        function deleteApplication(docId, appNumber) {
            if(confirm("আবেদন নং: " + appNumber + " এর অনুমোদন সম্পন্ন হয়েছে? Genset তালিকা থেকে সম্পূর্ণ ডিলিট করা হবে।")) {
                collectionRef.doc(docId).delete().then(() => {
                    document.getElementById('searchNumberInput').value = "";
                    document.getElementById('searchResultArea').innerHTML = `<div class="text-center text-xs text-green-600 font-bold py-2">✓ সফলভাবে ডিলিট করা হয়েছে!</div>`;
                });
            }
        }

        // তারিখ ও সময় ফরম্যাট করার একটি সাধারণ হেল্পার ফাংশন
        function formatFirebaseDate(timestamp) {
            if (!timestamp) return "অজানা সময়";
            const date = timestamp.toDate();
            
            // দিন-মাস-বছর ফরম্যাট
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            
            // ১২ ঘণ্টার ফরম্যাটে সময় (AM/PM সহ)
            let hours = date.getHours();
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 হলে 12 হবে
            const formattedHours = String(hours).padStart(2, '0');

            return `${day}-${month}-${year} (সময়: ${formattedHours}:${minutes} ${ampm})`;
        }

        // ৩. রিয়েল-টাইম সার্চ ফাংশন (তারিখ ও সময় প্রদর্শন সহ)
        function searchApplication() {
            const queryStr = document.getElementById('searchNumberInput').value.trim();
            const resultArea = document.getElementById('searchResultArea');
            
            if (queryStr === "") {
                resultArea.innerHTML = `<div class="text-center text-xs text-gray-400 py-2">নম্বর লিখলে রেজাল্ট এখানে দেখাবে</div>`;
                return;
            }

            const queryInt = parseInt(queryStr, 10);
            const matchedApps = allApplications.filter(app => app.appNumber === queryInt);

            if (matchedApps.length === 0) {
                resultArea.innerHTML = `<div class="text-center text-xs text-red-500 font-bold py-2">⚠ এই নম্বরের কোনো আবেদন খুঁজে পাওয়া যায়নি!</div>`;
                return;
            }

            resultArea.innerHTML = "";
            matchedApps.forEach((app) => {
                const timeString = formatFirebaseDate(app.entryTime);

                const cardHtml = `
                    <div class="flex items-center justify-between p-3 rounded-lg shadow-sm border border-red-300 bg-red-50 transition duration-150">
                        <div>
                            <div class="font-bold text-gray-800 text-sm">আবেদন নং: ${app.appNumber}</div>
                            <div class="text-[11px] text-gray-500 font-medium">এন্ট্রি: ${timeString}</div>
                        </div>
                        <button onclick="deleteApplication('${app.id}', '${app.appNumber}')" class="text-red-600 hover:text-red-800 transition" title="ডিলিট করুন">
                           <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                        </button>
                    </div>
                `;
                resultArea.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // ৪. রিয়েল-টাইম ডাটাবেজ লিসেনার
        function loadLiveDatabase() {
            collectionRef.orderBy('appNumber', 'asc').onSnapshot((snapshot) => {
                const listContainer = document.getElementById('applicationList');
                listContainer.innerHTML = ""; 
                
                allApplications = []; 

                if (snapshot.empty) {
                    listContainer.innerHTML = `<div class="text-center text-gray-500 bg-white py-6 rounded-xl shadow-sm border border-gray-200 text-xs">বর্তমানে কোনো আবেদনের কাগজ এন্ট্রি করা নেই।</div>`;
                    return;
                }

                let index = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const docId = doc.id;
                    const appNumber = data.appNumber;
                    const entryTime = data.entryTime;

                    // লোকাল ব্যাকআপে টাইমস্ট্যাম্পসহ ডেটা রাখা
                    allApplications.push({ id: docId, appNumber: appNumber, entryTime: entryTime });

                    const isFirst = index === 1;
                    const cardBg = isFirst ? 'bg-amber-50 border-amber-400' : 'bg-white border-gray-200';
                    const badgeBg = isFirst ? 'bg-amber-500 text-white' : 'bg-green-600 text-white';

                    const cardHtml = `
                        <div class="flex items-center justify-between p-3 rounded-xl shadow-sm border ${cardBg} transition duration-150">
                            <div class="flex items-center space-x-3">
                                <div class="w-7 h-7 rounded-full ${badgeBg} flex items-center justify-center font-bold text-xs">
                                    ${index}
                                </div>
                                <div>
                                    <div class="font-bold text-gray-800 text-sm">আবেদন নং: ${appNumber}</div>
                                    ${isFirst ? `<span class="text-[11px] font-semibold text-amber-700">পরবর্তী অনুমোদনযোগ্য আবেদন</span>` : `<span class="text-[11px] text-gray-400">অপেক্ষমাণ</span>`}
                                </div>
                            </div>
                        </div>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', cardHtml);
                    index++;
                });

                if (!document.getElementById('deleteSection').classList.contains('hidden')) {
                    searchApplication();
                }
            });
        }
    </script>
</body>
</html>
